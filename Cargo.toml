[package]
name = "hyprpower"
version = "0.1.0"
edition = "2021"

[dependencies]
gtk4 = "0.9.5"
glib = "0.20.7"
anyhow = "1.0"

im = { version = "15.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "unwind"    # Keep standard stack traces
strip = "symbols"   # Trim symbol tables
