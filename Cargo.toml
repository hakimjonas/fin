[package]
name = "fin"
version = "0.1.0"
edition = "2021"
description = "Finë is a simple, GTK4-based session controller for Linux desktops."
license = "MIT"
readme = "README.md"
authors = ["Hakim Jonas Ghoula"]
homepage = "https://github.com/hakimjonas/fin"
repository = "https://github.com/hakimjonas/fin"
documentation = "https://docs.rs/fin"

[dependencies]
gtk4 = { version = "0.9.3", features = ["v4_12"] }  # Latest stable with GTK 4.12 features
glib = "0.20.7"                     # Updated to match GTK4 version
anyhow = "1.0.81"                   # Updated error handling
im = { version = "15.1.0", features = ["serde"] }  # Latest immutable collections
serde = { version = "1.0.203", features = ["derive"] }
toml = "0.8.14"                     # Updated TAML support
clap = { version = "4.5.4", features = ["derive"] }  # Latest CLI parser
log = "0.4.21"
env_logger = "0.11.3"               # Updated logging stack


[profile.release]
opt-level = "z"                     # Optimize for size
lto = "thin"
codegen-units = 1
panic = "abort"                     # More secure than unwind
strip = "symbols"

[package.metadata.rpm]
name = "fin"
version = "0.1.0"
release = "1%{?dist}"
summary = "GTK4-based session controller"
license = "MIT"
url = "https://github.com/hakimjonas/fin"
requires = ["gtk4 >= 4.12.0", "libadwaita >= 1.4.0"]

[package.metadata.rpm.cargo]
buildflags = ["--release"]
binary = "fin"

[package.metadata.rpm.targets]
bin = { path = "target/release/fin", install_path = "/usr/bin/fin" }
assets = { path = "assets", install_path = "/usr/share/fin" }

[package.metadata.rpm.assets]
config = { src = "assets/config.toml", dest = "/usr/share/fin/config.toml" }
styles = { src = "assets/style.css", dest = "/usr/share/fin/style.css" }