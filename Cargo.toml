[package]
name = "fin"
version = "0.1.0"
edition = "2021"
description = "Finë is a simple, GTK4-based session controller for Linux desktops."
license = "MIT"
readme = "README.md"
authors = ["Hakim Jonas Ghoula"]
homepage = "https://github.com/hakimjonas/fin"
repository = "https://github.com/hakimjonas/fin"
documentation = "https://docs.rs/fin"

[dependencies]
gtk4 = { version = "0.9.3", features = ["v4_12"] }
glib = "0.20.7"
anyhow = "1.0.81"
im = { version = "15.1.0", features = ["serde"] }
serde = { version = "1.0.203", features = ["derive"] }
toml = "0.8.14"
clap = { version = "4.5.4", features = ["derive"] }
log = "0.4.21"
env_logger = "0.11.3"

[profile.release]
opt-level = "z"
lto = "thin"
codegen-units = 1
panic = "abort"
strip = "symbols"

[package.metadata.generate-rpm]
name = "fin"
version = "0.1.0"
release = "1%{?dist}"
summary = "GTK4-based session controller"
license = "MIT"
url = "https://github.com/hakimjonas/fin"
prefix = "/usr"
requires = ["gtk4 >= 4.12.0"]

assets = [
    { source = "target/release/fin", dest = "/usr/bin/fin", mode = "755" },
    { source = "assets/config.toml", dest = "/usr/share/fin/config.toml", mode = "644", config = true },
    { source = "assets/style.css", dest = "/usr/share/fin/style.css", mode = "644" }
]