[package]
name = "hyprpower"
version = "0.1.0"
edition = "2021"

[dependencies]
gtk4 = { version = "0.9", features = ["v4_4", "v4_12"] }
glib = "0.20.7"
anyhow = "1.0"
im = { version = "15.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
clap = { version = "4.0", features = ["derive"] }
log = "0.4.25"
env_logger = "0.11.6"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "unwind"    # Keep standard stack traces
strip = "symbols"   # Trim symbol tables
