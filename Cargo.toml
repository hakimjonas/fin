[package]
name = "hyprpower"
version = "0.1.0"
edition = "2021"

[dependencies]
im = "15.1.0"
serde = { version = "1.0.217", features = ["derive"] }
toml = "0.8.19"
gtk4 = "0.9.5"
glib = "0.20.7"
anyhow = "1.0"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "unwind"    # Keep standard stack traces
strip = "symbols"   # Trim symbol tables
