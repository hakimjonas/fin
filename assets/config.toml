# Finë Default Configuration
title = "Finë"
use_gtk_theme = false
theme = "default"
stylesheet = "style.css"

[layout]
window_width_ratio = 0.3
window_height_ratio = 0.3
button_font_ratio = 0.12

[default_commands]

# Hyprland: Locks screen, logs out, reboots, and powers off.
[default_commands.hyprland]
columns = 2
buttons = [
    { label = "󰌾", command = "hyprlock" },
    { label = "󰍃", command = "hyprctl dispatch exit" },
    { label = "󰜉", command = "systemctl reboot" },
    { label = "󰐥", command = "systemctl poweroff" }
]

# Sway: Locks screen, logs out, reboots, and powers off.
[default_commands.sway]
columns = 2
buttons = [
    { label = "󰌾", command = "swaylock -f -c 000000" },
    { label = "󰍃", command = "swaymsg exit" },
    { label = "󰜉", command = "systemctl reboot" },
    { label = "󰐥", command = "systemctl poweroff" }
]

# i3: Locks screen, logs out, reboots, and powers off.
[default_commands.i3]
columns = 2
buttons = [
    { label = "󰌾", command = "i3lock -c 000000" },
    { label = "󰍃", command = "i3-msg exit" },
    { label = "󰜉", command = "systemctl reboot" },
    { label = "󰐥", command = "systemctl poweroff" }
]

# GNOME: Locks screen, logs out, reboots, and powers off.
[default_commands.gnome]
columns = 2
buttons = [
    { label = "󰌾", command = "dbus-send --type=method_call --dest=org.gnome.ScreenSaver /org/gnome/ScreenSaver org.gnome.ScreenSaver.Lock" },
    { label = "󰍃", command = "gnome-session-quit --logout" },
    { label = "󰜉", command = "systemctl reboot" },
    { label = "󰐥", command = "systemctl poweroff" }
]

# Budgie: Locks screen, logs out, reboots, and powers off.
[default_commands.budgie]
columns = 2
buttons = [
    { label = "󰌾", command = "budgie-screensaver lock" },
    { label = "󰍃", command = "budgie-session-quit --logout" },
    { label = "󰜉", command = "systemctl reboot" },
    { label = "󰐥", command = "systemctl poweroff" }
]

# XFCE: Locks screen, logs out, reboots, and powers off.
[default_commands.xfce]
columns = 2
buttons = [
    { label = "󰌾", command = "xflock4" },
    { label = "󰍃", command = "xfce4-session-logout --logout" },
    { label = "󰜉", command = "systemctl reboot" },
    { label = "󰐥", command = "systemctl poweroff" }
]

# COSMIC: Suspends, locks screen, logs out, reboots, and powers off.
[default_commands.cosmic]
columns = 2
buttons = [
    { label = "󰤄", command = "systemctl suspend" },
    { label = "󰌾", command = "loginctl lock-session" },
    { label = "󰍃", command = "loginctl terminate-session $XDG_SESSION_ID" },
    { label = "󰜉", command = "systemctl reboot" },
    { label = "󰐥", command = "systemctl poweroff" }
]

# Common commands (fallback)
[default_commands.common]
columns = 2
buttons = [
    { label = "Lock", command = "loginctl lock-session" },
    { label = "Logout", command = "loginctl terminate-session $XDG_SESSION_ID" },
    { label = "Reboot", command = "systemctl reboot" },
    { label = "Poweroff", command = "systemctl poweroff" }
]
