title = "HyprPower"
columns = 2
stylesheet = "style.css"
use_system_theme = false # Set to true to use the system GTK4 theme

[[buttons]]
label = "" # Lock icon
command = "hyprctl dispatch exec hyprlock"

[[buttons]]
label = "󰩈" # Logout icon
command = "hyprctl dispatch exit"

[[buttons]]
label = "󰑓" # Reboot icon
command = "systemctl reboot"

[[buttons]]
label = "" # Shutdown icon
command = "systemctl poweroff"