# Use the official Solus image (development tag) from Docker Hub.
FROM silkeh/solus:devel

# Update the package repository and install GTK4 development libraries.
RUN eopkg up && eopkg it libgtk-4-devel --yes-all

# Install the Rust toolchain using rustup, update stable toolchain, and set default to stable.
RUN curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable && \
    . $HOME/.cargo/env && rustup update stable && rustup default stable

# Ensure Cargo’s bin directory is in the PATH.
ENV PATH="/root/.cargo/bin:${PATH}"

# Set working directory.
WORKDIR /app

# Copy the source code into the container.
COPY . .

# Update dependencies before building the app.
RUN cargo update

# Build the project in release mode.
RUN cargo build --release

# Run the application.
CMD ["./target/release/fin"]
