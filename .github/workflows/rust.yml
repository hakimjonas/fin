name: CI - Multi-Distro Build & Test

on:
  push:
    branches: [ automations ]
  pull_request:
    branches: [ automations ]
  workflow_dispatch:

jobs:
  build:
    env:
      RPM: ${{ secrets.RPM_PAT }}
    strategy:
      matrix:
        distro: [ ubuntu, fedora, arch, solus, nix ]
    runs-on: ubuntu-latest
    container:
      image: ${{ 
        matrix.distro == 'ubuntu' && 'ubuntu:latest' ||
        matrix.distro == 'fedora' && 'fedora:latest' ||
        matrix.distro == 'arch' && 'archlinux:latest' ||
        matrix.distro == 'solus' && 'silkeh/solus:devel' ||
        matrix.distro == 'nix' && 'nixos/nix'
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        run: |
          # Install curl first (handled in dependencies step)
          . "$HOME/.cargo/env" 2>/dev/null || true
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable

      - name: Install system dependencies
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update
              apt-get install -y curl libgtk-4-dev build-essential pkg-config
              ;;
            fedora)
              dnf install -y curl gtk4-devel pkgconf-pkg-config
              ;;
            arch)
              pacman -Syu --noconfirm curl gtk4 base-devel pkgconf
              ;;
            solus)
              eopkg upgrade
              eopkg it -y curl libgtk-4-devel
              ;;
            nix)
              nix-channel --update
              nix-env -iA nixpkgs.curl nixpkgs.gtk4 nixpkgs.pkg-config
              ;;
            *)
              echo "Unsupported distro: ${{ matrix.distro }}"
              exit 1
              ;;
          esac

      - name: Build project in release mode
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Run packaging tasks
        run: cargo make package

      - name: Set artifact path
        id: set-artifact-path
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)   echo "path=target/debian/fin_*.deb" >> $GITHUB_OUTPUT ;;
            fedora)   echo "path=target/fin-*-rpm.tar.gz" >> $GITHUB_OUTPUT ;;
            arch)     echo "path=target/fin-*-arch.tar.gz" >> $GITHUB_OUTPUT ;;
            solus)    echo "path=target/fin-*-solus.tar.gz" >> $GITHUB_OUTPUT ;;
            nix)      echo "path=target/fin-*-nix.tar.gz" >> $GITHUB_OUTPUT ;;
          esac

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-${{ matrix.distro }}
          path: ${{ steps.set-artifact-path.outputs.path }}
