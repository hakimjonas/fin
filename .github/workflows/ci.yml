name: CI - Multi-Distro Build & Test

on:
  push:
    branches:
      - '**'
  workflow_dispatch: { }
  workflow_call: { }

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            container: ubuntu:latest
          - distro: fedora
            container: fedora:latest
          - distro: arch
            container: archlinux:latest
          - distro: solus
            container: hakimjonas/fin-gtk:latest
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
      options: --entrypoint ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: "${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}"

      - name: Install system dependencies
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y curl libgtk-4-dev build-essential pkg-config
              ;;
            fedora)
              dnf install -y curl gtk4-devel pkgconf-pkg-config gcc
              ;;
            arch)
              pacman -Syu --noconfirm curl gtk4 base-devel pkgconf
              ;;
            solus)
              eopkg up -y || echo "Update failed, continuing..."
              eopkg it -y curl libgtk-4-devel gcc || echo "Installation failed, continuing..."
              ;;
          esac

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Install Clippy
        run: rustup component add clippy

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build project in release mode
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Run packaging tasks
        run: cargo make package

      - name: Set artifact path
        id: set-artifact-path
        run: |
          case "${{ matrix.distro }}" in
            ubuntu) echo "path=target/debian/fin_*.deb" >> $GITHUB_OUTPUT ;;
            fedora) echo "path=target/fin-*.rpm" >> $GITHUB_OUTPUT ;;
            arch) echo "path=target/fin-*-arch.tar.gz" >> $GITHUB_OUTPUT ;;
            solus) echo "path=target/fin-*-solus.tar.gz" >> $GITHUB_OUTPUT ;;
          esac

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-${{ matrix.distro }}
          path: ${{ steps.set-artifact-path.outputs.path }}
