name: CI - Multi-Distro Build & Test

on:
  push: { }
  pull_request: { }
  workflow_dispatch: { }

jobs:
  build:
    env:
      RPM: ${{ secrets.RPM_PAT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            container: ubuntu:latest
          - distro: fedora
            container: fedora:latest
          - distro: arch
            container: archlinux:latest
          - distro: solus
            container: silkeh/solus:devel
          - distro: nix
            container: nixos/nix
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
      options: --entrypoint ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache system dependencies
        if: matrix.distro == 'ubuntu'
        uses: actions/cache@v3
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-cache-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache system dependencies
        if: matrix.distro == 'fedora'
        uses: actions/cache@v3
        with:
          path: /var/cache/dnf
          key: ${{ runner.os }}-dnf-cache-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache system dependencies
        if: matrix.distro == 'arch'
        uses: actions/cache@v3
        with:
          path: /var/cache/pacman
          key: ${{ runner.os }}-pacman-cache-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache system dependencies
        if: matrix.distro == 'solus'
        uses: actions/cache@v3
        with:
          path: /var/cache/eopkg
          key: ${{ runner.os }}-eopkg-cache-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache system dependencies
        if: matrix.distro == 'nix'
        uses: actions/cache@v3
        with:
          path: /nix/store
          key: ${{ runner.os }}-nix-store-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo registry and git index
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build artifacts
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y curl libgtk-4-dev build-essential pkg-config
              ;;
            fedora)
              dnf install -y curl gtk4-devel pkgconf-pkg-config gcc
              ;;
            arch)
              pacman -Syu --noconfirm curl gtk4 base-devel pkgconf
              ;;
            solus)
              eopkg upgrade && eopkg it -y curl libgtk-4-devel
              ;;
            nix)
              nix-channel --update && \
              nix-env -iA nixpkgs.curl nixpkgs.gtk4 nixpkgs.pkg-config nixpkgs.gcc nixpkgs.nodejs
              ;;
            *)
              echo "Unsupported distro: ${{ matrix.distro }}"
              exit 1
              ;;
          esac

      - name: Install Rust via rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Build project in release mode
        run: |
          if [ "${{ matrix.distro }}" = "nix" ]; then export CC=gcc; fi
          cargo build --release

      - name: Run tests
        run: |
          if [ "${{ matrix.distro }}" = "nix" ]; then export CC=gcc; fi
          cargo test

      - name: Run packaging tasks
        run: |
          if [ "${{ matrix.distro }}" = "nix" ]; then export CC=gcc; fi
          cargo make package

      - name: Set artifact path
        id: set-artifact-path
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              echo "path=target/debian/fin_*.deb" >> $GITHUB_OUTPUT
              ;;
            fedora)
              echo "path=target/fin-*-rpm.tar.gz" >> $GITHUB_OUTPUT
              ;;
            arch)
              echo "path=target/fin-*-arch.tar.gz" >> $GITHUB_OUTPUT
              ;;
            solus)
              echo "path=target/fin-*-solus.tar.gz" >> $GITHUB_OUTPUT
              ;;
            nix)
              echo "path=target/fin-*-nix.tar.gz" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-${{ matrix.distro }}
          path: ${{ steps.set-artifact-path.outputs.path }}