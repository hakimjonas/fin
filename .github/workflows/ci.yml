name: CI - Multi-Distro Build & Test

on:
  push:
    branches:
      - automations
  pull_request:
    branches:
      - automations
  workflow_dispatch: {}

jobs:
  build:
    env:
      RPM: ${{ secrets.RPM_PAT }}
    strategy:
      matrix:
        include:
          - distro: ubuntu
            container: ubuntu:latest
          - distro: fedora
            container: fedora:latest
          - distro: arch
            container: archlinux:latest
          - distro: solus
            container: silkeh/solus:devel
          - distro: nix
            container: nixos/nix
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install curl
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y curl
              ;;
            fedora)
              dnf install -y curl
              ;;
            arch)
              pacman -Syu --noconfirm curl
              ;;
            solus)
              eopkg upgrade && eopkg it -y curl
              ;;
            nix)
              nix-channel --update && nix-env -iA nixpkgs.curl
              ;;
            *)
              echo "Unsupported distro: ${{ matrix.distro }}"
              exit 1
              ;;
          esac

      - name: Install Rust via rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          # Make Cargo's bin directory available in subsequent steps
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup update stable
          rustup default stable

      - name: Install system dependencies
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y libgtk-4-dev build-essential pkg-config
              ;;
            fedora)
              dnf install -y gtk4-devel pkgconf-pkg-config
              ;;
            arch)
              pacman -Syu --noconfirm gtk4 base-devel pkgconf
              ;;
            solus)
              eopkg upgrade && eopkg it -y libgtk-4-devel
              ;;
            nix)
              nix-channel --update && nix-env -iA nixpkgs.gtk4 nixpkgs.pkg-config
              ;;
            *)
              echo "Unsupported distro: ${{ matrix.distro }}"
              exit 1
              ;;
          esac

      - name: Build project in release mode
        run: cargo build --release

      - name: Run tests
        run: cargo test
