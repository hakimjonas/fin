name: CI - Multi-Distro Build & Test

on:
  push: { }
  pull_request: { }
  workflow_dispatch: { }

jobs:
  build:
    env:
      RPM: ${{ secrets.RPM_PAT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            container: ubuntu:latest
          - distro: fedora
            container: fedora:latest
          - distro: arch
            container: archlinux:latest
          - distro: solus
            container: silkeh/solus:devel
          - distro: nix
            # Use a container image that includes Node.js to avoid the "node not found" error.
            container: hakimjonas/nix-node:latest
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
      # Disable any forced entrypoint so that actions can run their own commands.
      options: --entrypoint ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry and git index
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build artifacts
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install curl
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y curl
              ;;
            fedora)
              dnf install -y curl
              ;;
            arch)
              pacman -Syu --noconfirm curl
              ;;
            solus)
              eopkg upgrade && eopkg it -y curl
              ;;
            nix)
              nix-channel --update && nix-env -iA nixpkgs.curl
              ;;
            *)
              echo "Unsupported distro: ${{ matrix.distro }}"
              exit 1
              ;;
          esac

      - name: Install Rust via rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          # Source Cargo's environment so rustup and cargo become available in this step
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          # Ensure Cargo's bin directory is available in subsequent steps
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Install system dependencies
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y libgtk-4-dev build-essential pkg-config
              ;;
            fedora)
              dnf install -y gtk4-devel pkgconf-pkg-config
              ;;
            arch)
              pacman -Syu --noconfirm gtk4 base-devel pkgconf
              ;;
            solus)
              eopkg upgrade && eopkg it -y libgtk-4-devel
              ;;
            nix)
              nix-channel --update && nix-env -iA nixpkgs.gtk4 nixpkgs.pkg-config
              ;;
            *)
              echo "Unsupported distro: ${{ matrix.distro }}"
              exit 1
              ;;
          esac

      - name: Build project in release mode
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Run packaging tasks
        run: cargo make package

      - name: Set artifact path
        id: set-artifact-path
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              echo "path=target/debian/fin_*.deb" >> $GITHUB_OUTPUT
              ;;
            fedora)
              echo "path=target/fin-*-rpm.tar.gz" >> $GITHUB_OUTPUT
              ;;
            arch)
              echo "path=target/fin-*-arch.tar.gz" >> $GITHUB_OUTPUT
              ;;
            solus)
              echo "path=target/fin-*-solus.tar.gz" >> $GITHUB_OUTPUT
              ;;
            nix)
              echo "path=target/fin-*-nix.tar.gz" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-${{ matrix.distro }}
          path: ${{ steps.set-artifact-path.outputs.path }}
