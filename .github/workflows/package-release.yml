name: Build and Package (Release Mode)

on:
  workflow_call:
    secrets:
      RELEASE:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Build project in release mode
        run: cargo build --release

      - name: Run packaging tasks
        run: cargo make package

      - name: Set artifact paths
        id: set-artifact-path
        run: |
          # Set outputs for all artifact patterns.
          echo "debian=target/debian/fin_*.deb" >> $GITHUB_OUTPUT
          echo "rpm=target/fin-*-rpm.tar.gz" >> $GITHUB_OUTPUT
          echo "solus=target/fin-*-solus.tar.gz" >> $GITHUB_OUTPUT
          echo "arch=target/fin-*-arch.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload Debian packaging artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-debian
          path: ${{ steps.set-artifact-path.outputs.debian }}

      - name: Upload RPM packaging artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-rpm
          path: ${{ steps.set-artifact-path.outputs.rpm }}

      - name: Upload Solus packaging artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-solus
          path: ${{ steps.set-artifact-path.outputs.solus }}

      - name: Upload Arch packaging artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-arch
          path: ${{ steps.set-artifact-path.outputs.arch }}
