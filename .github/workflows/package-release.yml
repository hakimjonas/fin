name: Build and Package (Release Mode)

on:
  workflow_call:
    secrets:
      RELEASE:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install system dependencies (including rpm build tools)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libgtk-4-dev build-essential pkg-config rpm

      # 3. Confirm PKG_CONFIG_PATH
      - name: Confirm PKG_CONFIG_PATH
        run: echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"

      # 4. Set up Rust toolchain
      - name: Set up Rust toolchain
        run: rustup default stable

      # 5. Install cargo-make
      - name: Install cargo-make
        run: cargo install cargo-make

      # 8. Build project in release mode
      - name: Build project in release mode
        run: cargo build --release

      # 9. Run tests
      - name: Run tests
        run: cargo test

      # 10. Run packaging tasks (this will run your cargo-make package task)
      - name: Run packaging tasks
        run: cargo make package

      # 11. Capture artifact paths
      - name: Set artifact paths
        id: set-artifact-path
        run: |
          echo "debian=target/debian/fin_*.deb" >> $GITHUB_OUTPUT
          rpm_file=$(find target/generate-rpm -maxdepth 1 -type f -name "fin*.rpm" | head -n 1)
          echo "rpm=$rpm_file" >> $GITHUB_OUTPUT
          echo "solus=target/fin-*-solus.zip" >> $GITHUB_OUTPUT
          echo "arch=target/fin-*-arch.zip" >> $GITHUB_OUTPUT
          echo "RPM file is: $rpm_file"  # Debug information

      # 12. Upload artifacts
      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-debian
          path: ${{ steps.set-artifact-path.outputs.debian }}

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-rpm
          path: ${{ steps.set-artifact-path.outputs.rpm }}

      - name: Upload Solus artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-solus
          path: ${{ steps.set-artifact-path.outputs.solus }}

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-arch
          path: ${{ steps.set-artifact-path.outputs.arch }}
