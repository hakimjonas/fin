name: Build and Package (Release Mode)

on:
  workflow_call:
    secrets:
      RELEASE:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig
    steps:
      # 1. Checkout code (same as in CI)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install system dependencies in the correct order (including RPM build tools)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libgtk-4-dev build-essential pkg-config rpm

      # 3. Set PKG_CONFIG_PATH so that pkg-config can locate glib-2.0.pc
      - name: Set PKG_CONFIG_PATH
        run: echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      # 4. Set up Rust toolchain (using rustup already on the runner)
      - name: Set up Rust toolchain
        run: rustup default stable

      # 5. Install cargo-make (needed for packaging tasks)
      - name: Install cargo-make
        run: cargo install cargo-make

      # 6. Install clippy and run it
      - name: Install clippy
        run: rustup component add clippy
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # 7. Build project in release mode
      - name: Build project in release mode
        run: cargo build --release

      # 8. Run tests
      - name: Run tests
        run: cargo test

      # 9. Run packaging tasks
      - name: Run packaging tasks
        run: cargo make package

      # 9.5 Sanitize RPM filename (remove invalid characters)
      - name: Sanitize RPM filename
        run: |
          for f in target/generate-rpm/fin*.rpm; do
            newf=$(echo "$f" | sed 's/%{?dist}//g');
            echo "Renaming $f to $newf";
            mv "$f" "$newf";
          done

      # 10. Set artifact paths for all four distributions
      - name: Set artifact paths
        id: set-artifact-path
        run: |
          echo "debian=target/debian/fin_*.deb" >> $GITHUB_OUTPUT
          echo "rpm=target/generate-rpm/fin*.rpm" >> $GITHUB_OUTPUT
          echo "solus=target/fin-*-solus.tar.gz" >> $GITHUB_OUTPUT
          echo "arch=target/fin-*-arch.tar.gz" >> $GITHUB_OUTPUT

      # 11. Upload artifacts
      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-debian
          path: ${{ steps.set-artifact-path.outputs.debian }}

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-rpm
          path: ${{ steps.set-artifact-path.outputs.rpm }}

      - name: Upload Solus artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-solus
          path: ${{ steps.set-artifact-path.outputs.solus }}

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: fin-package-arch
          path: ${{ steps.set-artifact-path.outputs.arch }}
