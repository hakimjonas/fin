name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build_and_package:
    # Call the reusable workflow from your repository.
    # Using your default branch "trunk" since that's where the file is.
    uses: hakimjonas/fin/.github/workflows/package-release.yml@trunk
    secrets:
      RELEASE: ${{ secrets.RELEASE }}

  release:
    needs: build_and_package
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This allows the job to create releases.
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Download artifacts produced by build_and_package job.
      - name: Download Debian Artifact
        uses: actions/download-artifact@v4
        with:
          name: fin-package-debian

      - name: Download RPM Artifact
        uses: actions/download-artifact@v4
        with:
          name: fin-package-rpm

      - name: Download Solus Artifact
        uses: actions/download-artifact@v4
        with:
          name: fin-package-solus

      - name: Download Arch Artifact
        uses: actions/download-artifact@v4
        with:
          name: fin-package-arch

      - name: Install release dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libcairo2-dev

      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/install.sh | sh
        continue-on-error: true

      - name: Create Release using GitHub CLI
        run: |
          gh release create "${{ github.ref }}" \
            --title "Release ${{ github.ref }}" \
            --notes "Release notes go here"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Release Artifacts using GitHub CLI
        run: |
          gh release upload "${{ github.ref }}" \
            fin_*.deb fin_*-rpm.tar.gz fin_*-solus.tar.gz fin_*-arch.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish Release
        run: gh release publish "${{ github.ref }}"
        env:
          GH_TOKEN: ${{ github.token }}
