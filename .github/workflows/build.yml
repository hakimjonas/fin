# File: .github/workflows/build.yml
name: Build and Package

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        type: string

env:
  NODE_VERSION: '20' # Update to the latest stable version

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Check Version Format
        id: version
        uses: nowsprinting/check-version-format-action@v4.0.4
        with:
          prefix: 'v'

      - name: Sync Version
        if: steps.semver.outputs.valid == 'true'
        uses: ./.github/actions/sync
        with:
          tag: ${{ github.ref_name }}

  build:
    needs: sync-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [ ubuntu, arch, solus, nix ]
        include:
          - distro: ubuntu
            package_task: deb
            container: ubuntu:latest
          - distro: arch
            package_task: arch
            container: archlinux:latest
            artifact_path: target/*-arch.tar.gz
          - distro: solus
            package_task: solus
            container: hakimjonas/fin-gtk:latest
            artifact_path: target/*-solus.tar.gz
          - distro: nix
            package_task: nix
            container: ubuntu:latest
            artifact_path: target/*-nix.tar.gz
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up ${{ matrix.distro }} environment
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y curl libgtk-4-dev build-essential pkg-config git
              ;;
            arch)
              pacman -Syu --noconfirm curl gtk4 base-devel pkgconf git
              ;;
            solus)
              eopkg up -y
              eopkg it -y curl libgtk-4-devel gcc git
              ;;
            nix)
              apt-get update && apt-get install -y curl build-essential pkg-config libglib2.0-dev libgtk-4-dev git
              ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build project
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Package
        run: cargo make package-${{ matrix.package_task }}

      - name: Verify artifacts
        run: |
          echo "Artifact path: ${{ matrix.artifact_path }}"
            echo "❌ No artifacts found for ${{ matrix.distro }}!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fin-${{ matrix.distro }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_path }}
