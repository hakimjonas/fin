name: Build and Package

on:
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            package_task: deb
            container: ubuntu:latest
            artifact_path: target/debian/*.deb
          - distro: arch
            package_task: arch
            container: archlinux:latest
            artifact_path: target/*-arch.tar.gz
          - distro: solus
            package_task: solus
            container: hakimjonas/fin-gtk:latest
            artifact_path: target/*-solus.tar.gz
          - distro: nix
            package_task: nix
            container: ubuntu:latest
            artifact_path: target/*-nix.tar.gz

    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
      options: --entrypoint ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure full history & tags are available
          persist-credentials: false  # Ensure a clean clone inside the container

      # ✅ Ensure Git is installed first!
      - name: Install system dependencies (including Git)
        run: |
          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update && apt-get install -y curl libgtk-4-dev build-essential pkg-config git
              ;;
            arch)
              pacman -Syu --noconfirm curl gtk4 base-devel pkgconf git
              ;;
            solus)
              eopkg up -y
              eopkg it -y curl libgtk-4-devel gcc git
              ;;
            nix)
              apt-get update && apt-get install -y curl build-essential pkg-config libglib2.0-dev libgtk-4-dev git
              ;;
          esac

      - name: Ensure Git Repository Exists (for Containers)
        run: |
          git config --global --add safe.directory $(pwd)
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --tags
          git fetch origin ${{ github.ref_name }}  # Ensure we fetch the branch
          git reset --hard origin/${{ github.ref_name }}  # Reset all untracked changes
          git clean -fdx  # Remove untracked files and directories
          git checkout ${{ github.ref_name }}  # Explicitly checkout the branch

      - name: Verify `sync-version.sh` Exists
        run: |
          pwd
          ls -la

      - name: Run Sync Version Script
        run: ./sync-version.sh


      - name: Verify Git Installation
        run: git --version  # Ensures Git is available in the container

      - name: Sync Version and Update Artifacts
        run: ./sync-version.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Build project
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Package
        run: cargo make package-${{ matrix.package_task }}

      - name: Verify artifacts
        run: |
          echo "Artifact path: ${{ matrix.artifact_path }}"
          ls -la $(dirname "${{ matrix.artifact_path }}") || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fin-${{ matrix.distro }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_path }}
