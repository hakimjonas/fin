[env]
export = ["CARGO_MANIFEST_DIR", "PROJECT_ROOT", "ASSETS_DIR", "VERSION"]
PROJECT_ROOT = "${CARGO_MAKE_WORKING_DIRECTORY}"
ASSETS_DIR = "${PROJECT_ROOT}/assets"
INSTALL_ASSETS_DIR = "/usr/share/fin"
INSTALL_BIN_DIR = "/usr/bin"
VERSION = "${CARGO_MAKE_CRATE_VERSION}"

[tasks.install-cargo-make]
description = "Install cargo-make if not already installed"
script = [
    "if ! command -v cargo-make &> /dev/null; then",
    "  echo \"cargo-make not found, installing...\"",
    "  cargo install cargo-make",
    "else",
    "  echo \"cargo-make is already installed\"",
    "fi"
]

[tasks.build-release]
description = "Build the Finë binary in release mode"
command = "cargo"
args = ["build", "--release"]

[tasks.copy-assets]
description = "Copy configuration, theme, and style assets to the installation directory"
script = [
    "echo \"Creating installation directory ${INSTALL_ASSETS_DIR}\"",
    "sudo mkdir -p ${INSTALL_ASSETS_DIR}/themes",
    "sudo chmod 755 ${INSTALL_ASSETS_DIR}",
    "echo \"Installing default configuration...\"",
    "sudo cp \"${ASSETS_DIR}/config.toml\" \"${INSTALL_ASSETS_DIR}/config.toml\"",
    "echo \"Installing default stylesheet...\"",
    "sudo cp \"${ASSETS_DIR}/style.css\" \"${INSTALL_ASSETS_DIR}/style.css\"",
    "echo \"Installing default theme...\"",
    "sudo cp \"${ASSETS_DIR}/default.toml\" \"${INSTALL_ASSETS_DIR}/themes/default.toml\"",
    "echo \"Installing desktop file...\"",
    "sudo mkdir -p /usr/share/applications",
    "sudo cp \"${ASSETS_DIR}/fin.desktop\" /usr/share/applications/fin.desktop"
]


[tasks.install-bin]
description = "Install the binary to the system binary directory"
script = [
    "BINARY=${PROJECT_ROOT}/target/release/fin",
    "if [ ! -f \"${BINARY}\" ]; then",
    "  echo \"Error: Binary not found at ${BINARY}\" >&2",
    "  exit 1",
    "fi",
    "echo \"Installing binary to ${INSTALL_BIN_DIR}...\"",
    "sudo cp ${BINARY} ${INSTALL_BIN_DIR}/",
    "sudo chmod 755 ${INSTALL_BIN_DIR}/fin"
]

[tasks.install-dependencies-ubuntu]
description = "Install dependencies on Ubuntu"
script = [
    "sudo apt-get update",
    "sudo apt-get install -y libgtk-4-dev libgdk-pixbuf-2.0-dev libgraphene-1.0-dev pkg-config build-essential"
]

[tasks.install-dependencies-arch]
description = "Install dependencies on Arch Linux"
script = [
    "sudo pacman -Syu --noconfirm gtk4 gdk-pixbuf2 graphene base-devel pkgconf"
]

[tasks.install-dependencies-solus]
description = "Install dependencies on Solus"
script = [
    "sudo eopkg up",
    "sudo eopkg install -y pkgconf libgtk-4-devel gdk-pixbuf-devel graphene-devel pango-devel gcc make"
]

[tasks.install-dependencies-fedora]
description = "Install dependencies on Fedora/RHEL"
script = [
    "sudo dnf install -y gtk4-devel gdk-pixbuf2-devel graphene-devel pkg-config gcc"
]

[tasks.install-dependencies]
description = "Install dependencies based on the detected distribution"
script = [
    "if [ -f /etc/os-release ]; then",
    "  . /etc/os-release",
    "  case $ID in",
    "    ubuntu|debian)",
    "      cargo make install-dependencies-ubuntu",
    "      ;;",
    "    arch)",
    "      cargo make install-dependencies-arch",
    "      ;;",
    "    solus)",
    "      cargo make install-dependencies-solus",
    "      ;;",
    "    fedora|rhel|centos)",
    "      cargo make install-dependencies-fedora",
    "      ;;",
    "    *)",
    "      echo \"Unsupported distribution: $ID\" >&2",
    "      echo \"Please install GTK4 development libraries manually.\" >&2",
    "      exit 1",
    "      ;;",
    "  esac",
    "else",
    "  echo \"Cannot detect distribution\" >&2",
    "  exit 1",
    "fi"
]

[tasks.copy-user-config]
description = "Copy configuration, theme, and style assets to the user's home directory if not already present"
script = [
    "USER_CONFIG_DIR=${HOME}/.config/fin",
    "mkdir -p ${USER_CONFIG_DIR}/themes",
    "if [ ! -f ${USER_CONFIG_DIR}/config.toml ]; then",
    "  echo \"Copying default configuration to ${USER_CONFIG_DIR}/config.toml\"",
    "  cp ${ASSETS_DIR}/config.toml ${USER_CONFIG_DIR}/config.toml",
    "else",
    "  echo \"User configuration already exists at ${USER_CONFIG_DIR}/config.toml\"",
    "fi",
    "if [ ! -f ${USER_CONFIG_DIR}/style.css ]; then",
    "  echo \"Copying default stylesheet to ${USER_CONFIG_DIR}/style.css\"",
    "  cp ${ASSETS_DIR}/style.css ${USER_CONFIG_DIR}/style.css",
    "else",
    "  echo \"User stylesheet already exists at ${USER_CONFIG_DIR}/style.css\"",
    "fi",
    "if [ ! -f ${USER_CONFIG_DIR}/themes/default.toml ]; then",
    "  echo \"Copying default theme to ${USER_CONFIG_DIR}/themes/default.toml\"",
    "  cp ${ASSETS_DIR}/default.toml ${USER_CONFIG_DIR}/themes/default.toml",
    "else",
    "  echo \"User theme already exists at ${USER_CONFIG_DIR}/themes/default.toml\"",
    "fi"
]


[tasks.install]
description = "Build and install Finë (binary and assets)"
dependencies = ["install-dependencies", "build-release", "copy-assets", "install-bin", "copy-user-config"]

[tasks.package-deb]
description = "Package Finë as a .deb using cargo-deb"
script = [
    "echo \"Installing cargo-deb (if needed)...\"",
    "cargo install cargo-deb --version 1.42.0 || true",
    "echo \"Packaging .deb...\"",
    "cargo deb --no-build"
]

[tasks.package-solus]
description = "Package Finë for Solus as a tarball (including Solus manifest if available)"
script = [
    "echo \"Packaging for Solus...\"",
    "rm -rf target/package/solus",
    "mkdir -p target/package/solus/usr/bin target/package/solus/usr/share/fin target/package/solus/usr/share/applications",
    "cp target/release/fin target/package/solus/usr/bin/",
    "cp assets/config.toml target/package/solus/usr/share/fin/",
    "cp assets/style.css target/package/solus/usr/share/fin/",
    "mkdir -p target/package/solus/usr/share/fin/themes",
    "cp assets/default.toml target/package/solus/usr/share/fin/themes/",
    "cp assets/fin.desktop target/package/solus/usr/share/applications/",
    "if [ -f fin.sol ]; then cp fin.sol target/package/solus/; else echo \"Warning: No Solus manifest (fin.sol) found.\"; fi",
    "tar -czvf target/fin-${VERSION}-solus.tar.gz -C target/package/solus .",
    "echo \"Solus package created: target/fin-${VERSION}-solus.tar.gz\""
]

[tasks.package-arch]
description = "Package Finë for Arch Linux as a tarball (including PKGBUILD if available)"
script = [
    "echo \"Packaging for Arch...\"",
    "rm -rf target/package/arch",
    "mkdir -p target/package/arch/fin",
    "cp target/release/fin target/package/arch/fin/",
    "cp -r assets target/package/arch/fin/",
    "if [ -f PKGBUILD ]; then cp PKGBUILD target/package/arch/fin/; else echo \"Warning: No PKGBUILD file found.\"; fi",
    "tar -czvf target/fin-${VERSION}-arch.tar.gz -C target/package/arch fin",
    "echo \"Arch package created: target/fin-${VERSION}-arch.tar.gz\""
]

[tasks.package-nix]
description = "Package Finë for Nix as a tarball (including flake.nix if available)"
script = [
    "echo \"Packaging for Nix...\"",
    "rm -rf target/package/nix",
    "mkdir -p target/package/nix/fin",
    "cp target/release/fin target/package/nix/fin/",
    "cp -r assets target/package/nix/fin/",
    "if [ -f flake.nix ]; then cp flake.nix target/package/nix/fin/; else echo \"Warning: No flake.nix file found.\"; fi",
    "tar -czvf target/fin-${VERSION}-nix.tar.gz -C target/package/nix fin",
    "echo \"Nix package created: target/fin-${VERSION}-nix.tar.gz\""
]

[tasks.package]
description = "Package Finë for distribution (Debian, Solus, Arch, and Nix)"
dependencies = [
    "build-release",
    "package-deb",
    "package-solus",
    "package-arch",
    "package-nix"
]