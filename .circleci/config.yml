version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."
      - run:
          name: Test Version Bump Sed Patterns
          command: |
            set -euo pipefail
            # Define a test new version for substitution
            test_new_version="0.2.6"
            
            # Test for Cargo.toml
            sample_cargo='version = "0.2.5"'
            expected_cargo='version = "0.2.6"'
            result_cargo=$(echo "$sample_cargo" | sed "s/^version *= *\"[^\"]*\"/version = \"$test_new_version\"/")
            if [ "$result_cargo" != "$expected_cargo" ]; then
              echo "Cargo.toml sed pattern failed: got '$result_cargo', expected '$expected_cargo'"
              exit 1
            fi

            # Test for PKGBUILD
            sample_pkgbuild='pkgver=0.2.5'
            expected_pkgbuild='pkgver=0.2.6'
            result_pkgbuild=$(echo "$sample_pkgbuild" | sed "s/^pkgver=.*/pkgver=$test_new_version/")
            if [ "$result_pkgbuild" != "$expected_pkgbuild" ]; then
              echo "PKGBUILD sed pattern failed: got '$result_pkgbuild', expected '$expected_pkgbuild'"
              exit 1
            fi

            # Test for fin.sol
            sample_finsol='version: "0.2.5"'
            expected_finsol='version: "0.2.6"'
            result_finsol=$(echo "$sample_finsol" | sed "s/^version: *\"[^\"]*\"/version: \"$test_new_version\"/")
            if [ "$result_finsol" != "$expected_finsol" ]; then
              echo "fin.sol sed pattern failed: got '$result_finsol', expected '$expected_finsol'"
              exit 1
            fi

            # Test for flake.nix
            sample_flake='  version = "0.2.5";'
            expected_flake='  version = "0.2.6";'
            result_flake=$(echo "$sample_flake" | sed "s/^[[:space:]]*version *= *\"[^\"]*\";/  version = \"$test_new_version\";/")
            if [ "$result_flake" != "$expected_flake" ]; then
              echo "flake.nix sed pattern failed: got '$result_flake', expected '$expected_flake'"
              exit 1
            fi

            # Test for INSTALL.md
            sample_install='Version: 0.2.5'
            expected_install='Version: 0.2.6'
            result_install=$(echo "$sample_install" | sed "s/^Version: .*/Version: $test_new_version/")
            if [ "$result_install" != "$expected_install" ]; then
              echo "INSTALL.md sed pattern failed: got '$result_install', expected '$expected_install'"
              exit 1
            fi
            
            echo "✅ All version bump sed patterns passed."

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Build Release Binary
          command: cargo build --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}
      - persist_to_workspace:
          root: .
          paths:
            - target/release/fin

  audit:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Run Cargo Audit
          command: cargo audit

  package:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build Packages for All Distributions
          command: |
            set -euo pipefail
            # Run cargo-make package task with --allow-dirty to permit packaging with uncommitted changes.
            cargo make package -- --allow-dirty
      - run:
          name: Verify Packaged Artifacts
          command: |
            set -euo pipefail
            ls -lh target/
            [ -f target/debian/fin_*_amd64.deb ] || { echo "❌ Debian package missing"; exit 1; }
            [ -f target/fin-*-arch.tar.gz ] || { echo "❌ Arch package missing"; exit 1; }
            [ -f target/fin-*-solus.tar.gz ] || { echo "❌ Solus package missing"; exit 1; }
            [ -f target/fin-*-nix.tar.gz ] || { echo "❌ Nix package missing"; exit 1; }
      - persist_to_workspace:
          root: .
          paths:
            - target/


  release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Configure GPG
          command: |
            set -euo pipefail
            mkdir -p ~/.gnupg
            chmod 700 ~/.gnupg
            printf '%s' "$FINE_SIGNATURE_KEY_B64" | base64 -d | gpg --batch --import
            echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf  # Safer directive
      - run:
          name: Update Version Metadata and Commit Bump
          command: |
            set -euo pipefail
            # Read the current version from Cargo.toml
            current_version=$(awk -F'"' '/^version *= */ {print $2; exit}' Cargo.toml)
            if [[ ! "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-.*)?$ ]]; then
              echo "❌ Invalid version format in Cargo.toml"
              exit 1
            fi
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            new_patch=$((patch + 1))
            new_version="${major}.${minor}.${new_patch}${BASH_REMATCH[4]:-}"
            
            # Update Cargo.toml
            sed -i "s/^version *= *\".*\"/version = \"$new_version\"/" Cargo.toml
            
            # Update PKGBUILD (expects a line like: pkgver=0.2.5)
            sed -i "s/^pkgver=.*/pkgver=$new_version/" PKGBUILD
            
            # Update fin.sol (expects a line like: version: "0.2.5")
            sed -i "s/^version: *\".*\"/version: \"$new_version\"/" fin.sol
            
            # Update flake.nix (expects a line like: version = "0.2.5";)
            sed -i "s/^[[:space:]]*version *= *\"[^\"]*\";/  version = \"$new_version\";/" flake.nix
            
            # Update INSTALL.md (expects a line starting with 'Version:')
            sed -i "s/^Version: .*/Version: $new_version/" INSTALL.md
            
            echo "✅ Version bumped to $new_version in Cargo.toml, PKGBUILD, fin.sol, flake.nix, and INSTALL.md"
            echo "export RELEASE_VERSION=$new_version" >> $BASH_ENV

            # Configure Git for automated commit
            git config user.email "ci-bot@example.com"
            git config user.name "CI Bot"

            # Commit the version bump on a new branch
            branch="version-bump-$new_version"
            git checkout -b "$branch"
            git add Cargo.toml PKGBUILD fin.sol flake.nix INSTALL.md
            git commit -m "chore: bump version to $new_version"
            git push --force origin "$branch"
      - run:
          name: Sign Artifacts and Generate Checksums
          command: |
            set -euo pipefail
            for file in target/debian/fin_*_amd64.deb target/fin-*-arch.tar.gz target/fin-*-solus.tar.gz target/fin-*-nix.tar.gz; do
              if [ -f "$file" ]; then
                gpg --batch --pinentry-mode loopback --passphrase "$FINE_SIGNATURE_PASSPHRASE" --detach-sign --armor "$file"
                sha256sum "$file" > "$file.sha256"
              fi
            done
      - run:
          name: Publish Release
          command: |
            set -euo pipefail
            # Authenticate with GitHub
            GITHUB_TOKEN_VALUE="$GH_TOKEN"
            unset GH_TOKEN
            echo "$GITHUB_TOKEN_VALUE" | gh auth login --with-token

            current_version=$(awk -F'"' '/^version *= */ {print $2; exit}' Cargo.toml)
            gh release create "v${current_version}" \
              --title "Release ${current_version}" \
              --notes-file CHANGELOG.md \
              target/debian/fin_*_amd64.deb target/fin-*-arch.tar.gz target/fin-*-solus.tar.gz target/fin-*-nix.tar.gz \
              target/debian/fin_*_amd64.deb.asc target/fin-*-arch.tar.gz.asc target/fin-*-solus.tar.gz.asc target/fin-*-nix.tar.gz.asc \
              target/debian/fin_*_amd64.deb.sha256 target/fin-*-arch.tar.gz.sha256 target/fin-*-solus.tar.gz.sha256 target/fin-*-nix.tar.gz.sha256
      - run:
          name: Create Version Bump PR
          command: |
            set -euo pipefail
            current_version=$(awk -F'"' '/^version *= */ {print $2; exit}' Cargo.toml)
            pr_title="chore: version bump to $current_version"
            pr_body="Automated version bump to $current_version."
            gh pr create --title "$pr_title" --body "$pr_body" --base main --head "version-bump-$current_version"

workflows:
  version: 2
  build_test_release:
    jobs:
      - env_check
      - audit
      - lint:
          requires: [ env_check, audit ]
      - test:
          requires: [ env_check, audit ]
      - build:
          requires: [ env_check, audit ]
      - package:
          requires: [ build, lint, test ]
      - release:
          requires: [ package ]
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$/
