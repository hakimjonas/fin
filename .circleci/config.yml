version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            if [ -z "$GH_TOKEN" ]; then
              echo "GH_TOKEN is not set!"
              exit 1
            fi
            if [ -z "$FINE_SIGNATURE_KEY_B64" ]; then
              echo "FINE_SIGNATURE_KEY_B64 is not set!"
              exit 1
            fi
            if [ -z "$FINE_SIGNATURE_PASSPHRASE" ]; then
              echo "FINE_SIGNATURE_PASSPHRASE is not set!"
              exit 1
            fi
            echo "All required environment variables are set."
      - run:
          name: Test GPG Key Import
          command: |
            printf '%s' "$FINE_SIGNATURE_KEY_B64" | base64 -d | gpg --no-tty --batch --yes --import
            echo "GPG key imported successfully."
      - run:
          name: Verify GH_TOKEN with GitHub CLI
          command: |
            gh auth status || { echo "GH_TOKEN is not working correctly!"; exit 1; }
            echo "GH_TOKEN is working correctly."
      - run:
          name: Test Version Extraction
          command: |
            # Attempt to extract the version from Cargo.toml
            current_version=$(grep 'version *= *"' Cargo.toml | head -n1 | sed 's/.*version *= *"//;s/".*//')
            if [ -z "$current_version" ]; then
              echo "Failed to extract version from Cargo.toml!"
              exit 1
            else
              echo "Extracted version: $current_version"
            fi
  

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    parallelism: 2
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Build Release Binary
          command: cargo build --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}
      - persist_to_workspace:
          root: .
          paths:
            - target

  audit:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Cargo Audit
          command: cargo audit

  package:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Package Artifacts
          command: |
            mkdir -p packaged
            cp target/release/fin packaged/fin
            tar -czvf packaged/fin.tar.gz -C packaged fin
      - run:
          name: Verify Packaged Artifacts
          command: |
            if [ ! -f packaged/fin.tar.gz ]; then
              echo "Packaged file missing!"
              exit 1
            fi
            sha256sum packaged/fin.tar.gz
      - persist_to_workspace:
          root: .
          paths:
            - packaged

  release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Install GitHub CLI
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            apt update && apt install gh -y
      - run:
          name: Import GPG Key
          command: |
            printf '%s' "$FINE_SIGNATURE_KEY_B64" | base64 -d | gpg --no-tty --batch --yes --import
            echo "use-agent" >> ~/.gnupg/gpg.conf
            echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
            echo "Version bump completed: $new_version"

      - run:
          name: Sign Artifacts and Generate Checksums
          command: |
            for file in packaged/fin.tar.gz; do
              gpg --batch --no-tty --yes --pinentry-mode loopback --passphrase "$FINE_SIGNATURE_PASSPHRASE" --detach-sign --armor "$file"
              sha256sum "$file" > "$file.sha256"
            done
      - run:
          name: Create GitHub Release
          command: |
            gh release create ${CIRCLE_TAG} --notes-file CHANGELOG.md --title "Release ${CIRCLE_TAG}"
      - run:
          name: Upload Artifacts
          command: |
            for file in packaged/fin.tar.gz packaged/fin.tar.gz.asc packaged/fin.tar.gz.sha256; do
              gh release upload ${CIRCLE_TAG} "$file"
            done

workflows:
  version: 2
  build_test_release:
    jobs:
      - env_check
      - lint:
          requires: [ env_check ]
      - test:
          requires: [ env_check ]
      - build:
          requires: [ env_check, ]
      - audit:
          requires: [ lint, test, build ]
      - package:
          requires: [ audit ]
      - release:
          requires: [ package ]
          filters:
            tags:
              only: /^v.*/
