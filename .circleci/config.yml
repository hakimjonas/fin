version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."

  verify_files:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Files Exist
          command: |
            set -euo pipefail
            required_files=(Cargo.toml PKGBUILD fin.sol flake.nix INSTALL.md CHANGELOG.md)
            for file in "${required_files[@]}"; do
              if [ ! -f "$file" ]; then
                echo "❌ Required file '$file' does not exist!"
                exit 1
              else
                echo "✅ File '$file' exists."
              fi
            done

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Build Release Binary
          command: cargo build --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}
      - persist_to_workspace:
          root: .
          paths:
            - target/release/fin

  # Auto version bump job that runs only on trunk (if no tag is present)
  bump:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Trigger Version Bump
          command: |
            if [ "$(git rev-parse --abbrev-ref HEAD)" = "trunk" ]; then
              echo "On trunk, running version bump script..."
              ./scripts/version-bump.sh
            else
              echo "Not on trunk, skipping version bump."
            fi

workflows:
  build_and_bump:
    jobs:
      - env_check
      - verify_files
      - lint:
          requires:
            - env_check
            - verify_files
      - test:
          requires:
            - env_check
            - verify_files
      - build:
          requires:
            - env_check
            - verify_files
      # The bump job runs only on trunk and ignores tags (so manual major/minor bumps via tags bypass it)
      - bump:
          requires:
            - build
          filters:
            branches:
              only: trunk
            tags:
              ignore: /.*/
