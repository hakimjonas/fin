version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release

  build_and_package:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Build Release Binary
          command: cargo make build-release
      - run:
          name: Package Artifacts
          command: cargo make package
      - persist_to_workspace:
          root: .
          paths:
            - target

  release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Sync Version & Update Files
          command: cargo make sync-version
      - run:
          name: Create GitHub Release
          command: |
            gh release create ${CIRCLE_TAG} --notes-file CHANGELOG.md --title "Release ${CIRCLE_TAG}"
      - run:
          name: Upload Artifacts
          command: |
            find target -type f -name "fin-*.*" -exec gh release upload ${CIRCLE_TAG} {} \;

workflows:
  version: 2
  build_test_release:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - build_and_package:
          requires:
            - test
      - release:
          requires:
            - build_and_package
          filters:
            tags:
              only: /^v.*/
