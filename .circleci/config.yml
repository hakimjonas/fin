version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    parallelism: 2
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Build Release Binary
          command: cargo build --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}
      - persist_to_workspace:
          root: .
          paths:
            - target

  audit:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Cargo Audit
          command: cargo audit

  package:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Package Artifacts
          command: |
            # Example packaging logic: copy the release binary and create a tarball.
            mkdir -p packaged
            cp target/release/fin packaged/fin
            tar -czvf packaged/fin.tar.gz -C packaged fin
      - run:
          name: Verify Packaged Artifacts
          command: |
            if [ ! -f packaged/fin.tar.gz ]; then
              echo "Packaged file missing!"
              exit 1
            fi
            sha256sum packaged/fin.tar.gz
      - persist_to_workspace:
          root: .
          paths:
            - packaged

  release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Install GitHub CLI
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg |  dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" |  tee /etc/apt/sources.list.d/github-cli.list > /dev/null
             apt update &&  apt install gh -y
      - run:
          name: Import GPG Key
          command: |
            printf '%s' "$FINE_SIGNATURE_KEY_B64" | base64 -d | gpg --no-tty --batch --yes --import
            echo "use-agent" >> ~/.gnupg/gpg.conf
            echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
      - run:
          name: Sync Version & Update Files
          command: |
            # Extract current version from Cargo.toml (allows for leading whitespace)
            current_version=$(grep 'version *= *"' Cargo.toml | head -n1 | sed 's/.*version *= *"//;s/".*//')
            echo "Current version: $current_version"
            IFS='.' read -r major minor patch \<<< "$current_version"
            new_patch=$((patch + 1))
            new_version="${major}.${minor}.${new_patch}"
            echo "Bumping version from $current_version to $new_version"

            # Update top-level version in Cargo.toml (first occurrence)
            sed -i "s/version = \"$current_version\"/version = \"$new_version\"/" Cargo.toml

            # Prepend a new entry to CHANGELOG.md with the new version and current date
            echo "## [${new_version}] - $(date +%Y-%m-%d)" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md

            # Update INSTALL.md: Replace version in package filenames
            sed -i "s/fin-$current_version/fin-$new_version/g" INSTALL.md
            sed -i "s/fin_$current_version/fin_$new_version/g" INSTALL.md

            # Update PKGBUILD: Update the pkgver variable and the version in the source URL
            sed -E -i "s/pkgver=[0-9]+\.[0-9]+\.[0-9]+/pkgver=$new_version/g" PKGBUILD
            sed -E -i "s/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz/v$new_version.tar.gz/g" PKGBUILD

            # Update flake.nix: Update the version attribute
            sed -E -i "s/version = \"[0-9]+\.[0-9]+\.[0-9]+\"/version = \"$new_version\"/g" flake.nix

            # Update fin.sol: Update the <Version> tag in the XML file
            sed -i "s/<Version>$current_version<\/Version>/<Version>$new_version<\/Version>/g" fin.sol

            # Additionally, update the [package.metadata.rpm] version in Cargo.toml:
            sed -i "/\[package.metadata.rpm\]/,/^\[/ s/version = \"[0-9]+\.[0-9]+\.[0-9]+\"/version = \"$new_version\"/" Cargo.toml

            echo "Version bump completed: $new_version"

      - run:
          name: Commit Version Bump
          command: |
            git config --global user.email "hakim@ghoula.net"
            git config --global user.name "Hakim"
            git add Cargo.toml CHANGELOG.md INSTALL.md PKGBUILD flake.nix fin.sol
            git commit -m "Bump version to $new_version [ci skip]"
      - run:
          name: Push Version Bump Branch and Create PR
          command: |
            # Create a new branch for the version bump from the default branch "trunk"
            git checkout -b version-bump-$new_version
            # If the branch already exists on remote, delete it
            if git ls-remote --exit-code --heads origin version-bump-$new_version; then
              echo "Remote branch version-bump-$new_version exists. Deleting it..."
              git push origin --delete version-bump-$new_version
            fi
            git push origin version-bump-$new_version
            pr_url=$(gh pr create --title "Version bump to $new_version" --body "Automated version bump" --base trunk --head version-bump-$new_version)
            echo "Created PR: $pr_url"
            gh pr merge version-bump-$new_version --auto --squash --delete-branch
      - run:
          name: Sign Artifacts and Generate Checksums
          command: |
            for file in packaged/fin.tar.gz; do
              gpg --batch --no-tty --yes --pinentry-mode loopback --passphrase "$FINE_SIGNATURE_PASSPHRASE" --detach-sign --armor "$file"
              sha256sum "$file" > "$file.sha256"
            done
      - run:
          name: Create GitHub Release
          command: |
            gh release create ${CIRCLE_TAG} --notes-file CHANGELOG.md --title "Release ${CIRCLE_TAG}"
      - run:
          name: Upload Artifacts
          command: |
            for file in packaged/fin.tar.gz packaged/fin.tar.gz.asc packaged/fin.tar.gz.sha256; do
              gh release upload ${CIRCLE_TAG} "$file"
            done

workflows:
  version: 2
  build_test_release:
    jobs:
      - lint
      - test
      - build
      - audit:
          requires:
            - lint
            - test
            - build
      - package:
          requires:
            - audit
      - release:
          requires:
            - package
          filters:
            tags:
              only: /^v.*/
