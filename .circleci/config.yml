version: 2.1

executors:
  rust-executor:
    docker:
      - image: cimg/rust:1.71.0
    working_directory: ~/repo

jobs:
  lint:
    executor: rust-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: rust-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo
          key: cargo-{{ checksum "Cargo.lock" }}

  build_and_package:
    executor: rust-executor
    environment:
      NODE_VERSION: "20"
    steps:
      - checkout
      - run:
          name: Install Node.js (v20)
          command: |
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Install Cargo Make
          command: cargo install cargo-make || true
      - run:
          name: Build Release Binary
          command: cargo make build-release
      - run:
          name: Package Artifacts
          command: cargo make package
      - persist_to_workspace:
          root: .
          paths:
            - target

  release:
    executor: rust-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Sync Version & Update Files
          command: cargo make sync-version
      - run:
          name: Create GitHub Release
          command: |
            # Ensure GitHub CLI is installed in the image or install it here if necessary.
            gh release create ${CIRCLE_TAG} --notes-file CHANGELOG.md --title "Release ${CIRCLE_TAG}"
      - run:
          name: Upload Artifacts
          command: |
            find target -type f -name "fin-*.*" -exec gh release upload ${CIRCLE_TAG} {} \;

workflows:
  version: 2
  build_test_release:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - build_and_package:
          requires:
            - test
      - release:
          requires:
            - build_and_package
          filters:
            tags:
              only: /^v.*/
