version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."

  verify_files:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Files Exist
          command: |
            set -euo pipefail
            required_files=(Cargo.toml PKGBUILD fin.sol flake.nix INSTALL.md CHANGELOG.md)
            for file in "${required_files[@]}"; do
              if [ ! -f "$file" ]; then
                echo "❌ Required file '$file' missing!"
                exit 1
              else
                echo "✅ File '$file' exists."
              fi
            done

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run: cargo build --release
      - persist_to_workspace:
          root: .
          paths:
            - target/release/fin

  bump:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Trigger Version Bump
          command: ./scripts/version-bump.sh

  release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run Release Script
          command: ./scripts/release.sh

workflows:
  build_test_and_bump:
    jobs:
      - env_check
      - verify_files
      - lint:
          requires:
            - env_check
            - verify_files
      - test:
          requires:
            - env_check
            - verify_files
      - build:
          requires:
            - lint
            - test
      - bump:
          requires:
            - build
          filters:
            branches:
              only: trunk
              ignore: /^version-bump-.*/
            tags:
              ignore: /.*/

  release_on_tag:
    jobs:
      - release:
          requires:
            - bump
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$/
