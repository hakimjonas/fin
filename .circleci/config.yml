version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."

  verify_files:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Files Exist
          command: |
            set -euo pipefail
            required_files=(Cargo.toml PKGBUILD fin.sol flake.nix INSTALL.md CHANGELOG.md)
            for file in "${required_files[@]}"; do
              if [ ! -f "$file" ]; then
                echo "❌ Required file '$file' missing!"
                exit 1
              else
                echo "✅ File '$file' exists."
              fi
            done

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run:
          name: Install cargo-audit
          command: |
            if ! cargo audit --version &> /dev/null; then
              cargo install cargo-audit
            fi
      - run:
          name: Check for security vulnerabilities
          command: cargo audit
      - run: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run: cargo build --release
      - persist_to_workspace:
          root: .
          paths:
            - target/release/fin

  bump_and_release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Install cargo-make
          command: |
            if ! command -v cargo-make &> /dev/null; then
              cargo install cargo-make
            fi
      - run:
          name: Install cargo-deb
          command: |
            if ! cargo deb --version &> /dev/null; then
              cargo install cargo-deb --version 1.42.0
            fi
      - run:
          name: Bump Version and Release
          command: ./scripts/bump-and-release.sh

workflows:
  # Run tests on all branches, bump and release only on trunk
  build_test_bump_release:
    jobs:
      - env_check:
          filters:
            tags:
              ignore: /.*/
      - verify_files:
          filters:
            tags:
              ignore: /.*/
      - lint:
          requires:
            - env_check
            - verify_files
          filters:
            tags:
              ignore: /.*/
      - build:
          requires:
            - lint
          filters:
            tags:
              ignore: /.*/
      - test:
          requires:
            - build
          filters:
            tags:
              ignore: /.*/
      - bump_and_release:
          requires:
            - test
          filters:
            branches:
              only: trunk
            tags:
              ignore: /.*/
