version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust toolchain
          command: rustup default stable
      - run:
          name: Build Release Binary
          command: cargo build --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}
      - persist_to_workspace:
          root: .
          paths:
            - target/release/fin

  audit:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Run Cargo Audit
          command: cargo audit

  package:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Package Artifacts
          command: |
            set -euo pipefail
            mkdir -p packaged
            [ -f target/release/fin ] || { echo "❌ Binary not found"; exit 1; }
            cp -v target/release/fin packaged/
            tar -czvf packaged/fin.tar.gz -C packaged fin
      - run:
          name: Verify Packaged Artifacts
          command: |
            set -euo pipefail
            [ -f packaged/fin.tar.gz ] || { echo "❌ Missing package"; exit 1; }
            sha256sum packaged/fin.tar.gz
      - persist_to_workspace:
          root: .
          paths:
            - packaged

  release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Configure GPG
          command: |
            set -euo pipefail
            printf '%s' "$FINE_SIGNATURE_KEY_B64" | base64 -d | gpg --batch --import
            echo "allow-loopback-pinentry" >> ~/.gnupg/gpg.conf
      - run:
          name: Update Version Metadata
          command: |
            set -euo pipefail
            current_version=$(awk -F'"' '/^version *= */ {print $2; exit}' Cargo.toml)
            [[ "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-.*)?$ ]] || { echo "❌ Invalid version format"; exit 1; }

            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            new_patch=$((patch + 1))
            new_version="${major}.${minor}.${new_patch}${BASH_REMATCH[4]:-}"

            sed -i "s/version = \".*\"/version = \"$new_version\"/" Cargo.toml
            echo "✅ Version bumped to $new_version"
            echo "export RELEASE_VERSION=$new_version" >> $BASH_ENV
      - run:
          name: Publish Release
          command: |
            set -euo pipefail
            echo "$GH_TOKEN" | gh auth login --with-token

            # Extract the updated version from Cargo.toml
            current_version=$(awk -F'"' '/^version *= */ {print $2; exit}' Cargo.toml)

            # Create release using the version from Cargo.toml
            gh release create "v${current_version}" \
              --title "Release ${current_version}" \
              --notes-file CHANGELOG.md \
              packaged/fin.tar.gz{,.asc,.sha256}

            # Sign and verify artifacts
            for file in packaged/fin.tar.gz; do
              gpg --batch --pinentry-mode loopback --passphrase "$FINE_SIGNATURE_PASSPHRASE" \
                --detach-sign --armor "$file"
              gpg --verify "${file}.asc" "$file"
              sha256sum "$file" > "${file}.sha256"
            done

workflows:
  version: 2
  build_test_release:
    jobs:
      - env_check
      - audit
      - lint:
          requires: [ env_check, audit ]
      - test:
          requires: [ env_check, audit ]
      - build:
          requires: [ env_check, audit ]
      - package:
          requires: [ build, lint, test ]
      - release:
          requires: [ package ]
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$/
