version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."
      - run:
          name: Test Version Bump Sed Patterns
          command: |
            set -euo pipefail
            test_new_version="0.2.6"
            sample_cargo='version = "0.2.5"'
            expected_cargo='version = "0.2.6"'
            result_cargo=$(echo "$sample_cargo" | sed "s/^version *= *\"[^\"]*\"/version = \"$test_new_version\"/")
            if [ "$result_cargo" != "$expected_cargo" ]; then
              echo "Cargo.toml sed pattern failed: got '$result_cargo', expected '$expected_cargo'"
              exit 1
            fi
            sample_pkgbuild='pkgver=0.2.5'
            expected_pkgbuild='pkgver=0.2.6'
            result_pkgbuild=$(echo "$sample_pkgbuild" | sed "s/^pkgver=.*/pkgver=$test_new_version/")
            if [ "$result_pkgbuild" != "$expected_pkgbuild" ]; then
              echo "PKGBUILD sed pattern failed: got '$result_pkgbuild', expected '$expected_pkgbuild'"
              exit 1
            fi
            sample_finsol='version: "0.2.5"'
            expected_finsol='version: "0.2.6"'
            result_finsol=$(echo "$sample_finsol" | sed "s/^version: *\"[^\"]*\"/version: \"$test_new_version\"/")
            if [ "$result_finsol" != "$expected_finsol" ]; then
              echo "fin.sol sed pattern failed: got '$result_finsol', expected '$expected_finsol'"
              exit 1
            fi
            sample_flake='  version = "0.2.5";'
            expected_flake='  version = "0.2.6";'
            result_flake=$(echo "$sample_flake" | sed "s/^[[:space:]]*version *= *\"[^\"]*\";/  version = \"$test_new_version\";/")
            if [ "$result_flake" != "$expected_flake" ]; then
              echo "flake.nix sed pattern failed: got '$result_flake', expected '$expected_flake'"
              exit 1
            fi
            sample_install='Version: 0.2.5'
            expected_install='Version: 0.2.6'
            result_install=$(echo "$sample_install" | sed "s/^Version: .*/Version: $test_new_version/")
            if [ "$result_install" != "$expected_install" ]; then
              echo "INSTALL.md sed pattern failed: got '$result_install', expected '$expected_install'"
              exit 1
            fi
            echo "✅ All version bump sed patterns passed."

  verify_files:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Files Exist
          command: |
            set -euo pipefail
            required_files=(Cargo.toml PKGBUILD fin.sol flake.nix INSTALL.md CHANGELOG.md)
            for file in "${required_files[@]}"; do
              if [ ! -f "$file" ]; then
                echo "❌ Required file '$file' does not exist!"
                exit 1
              else
                echo "✅ File '$file' exists."
              fi
            done

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Run Clippy
          command: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run:
          name: Check Formatting
          command: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Run Tests
          command: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Set Rust Toolchain
          command: rustup default stable
      - run:
          name: Build Release Binary
          command: cargo build --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}
      - persist_to_workspace:
          root: .
          paths:
            - target/release/fin

  audit:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Run Cargo Audit
          command: cargo audit

  release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."
      - run:
          name: Debug Environment Variables
          command: |
            set -euo pipefail
            echo "GH_TOKEN is set to: ${GH_TOKEN:-not set}"
            env | grep GH_TOKEN
      - run:
          name: Configure GPG
          command: |
            set -euo pipefail
            mkdir -p ~/.gnupg
            chmod 700 ~/.gnupg
            printf '%s' "$FINE_SIGNATURE_KEY_B64" | base64 -d | gpg --batch --import
            echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
      - run:
          name: Install GitHub CLI
          command: |
            set -euo pipefail
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | gpg --yes --batch --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            apt-get update
            apt-get install -y gh
      - run:
          name: Authenticate and Release Actions
          command: |
            set -euo pipefail
            # Save and unset the token.
            token="$GH_TOKEN"
            unset GH_TOKEN
            echo "$token" | gh auth login --with-token
            gh auth status

            # Determine new version.
            if [ -n "${CIRCLE_TAG:-}" ]; then
              new_version="${CIRCLE_TAG#v}"
              echo "Tag detected: releasing version $new_version"
            else
              current_version=$(awk -F'"' '/^version *= */ {print $2; exit}' Cargo.toml)
              if [[ ! "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-.*)?$ ]]; then
                echo "❌ Invalid version format: $current_version"
                exit 1
              fi
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              suffix="${BASH_REMATCH[4]:-}"
              new_patch=$((patch + 1))
              new_version="${major}.${minor}.${new_patch}${suffix}"
              echo "Bumping version: $current_version → $new_version"
            fi

            # Capture the old version from Cargo.toml.
            old_version=$(awk -F'"' '/^version *= */ {print $2; exit}' Cargo.toml)

            # Update version in files.
            sed -i "s/^version *= *\".*\"/version = \"$new_version\"/" Cargo.toml
            sed -i "s/^pkgver=.*/pkgver=$new_version/" PKGBUILD
            # Update fin.sol: change the XML <Version> tag.
            sed -i 's|<Version>[^<]*</Version>|<Version>'"$new_version"'</Version>|' fin.sol
            sed -i "s/^[[:space:]]*version *= *\"[^\"]*\";/  version = \"$new_version\";/" flake.nix
            # Update INSTALL.md by replacing all occurrences of the old version.
            sed -i "s/$old_version/$new_version/g" INSTALL.md
            # Update CHANGELOG.md:
            if grep -q "^## \[Unreleased\]" CHANGELOG.md; then
              sed -i "s/^## \[Unreleased\]/## [$new_version] - $(date +%Y-%m-%d)/" CHANGELOG.md
            else
              echo "## [$new_version] - $(date +%Y-%m-%d)" | cat - CHANGELOG.md > tmp && mv tmp CHANGELOG.md
              echo "Appended new changelog header."
            fi

            # Verify updates in critical files.
            if ! grep -q "<Version>$new_version</Version>" fin.sol; then
              echo "❌ fin.sol did not update to version $new_version"
              exit 1
            fi
            if ! grep -q "$new_version" INSTALL.md; then
              echo "❌ INSTALL.md did not update to version $new_version"
              exit 1
            fi

            # Git configuration and commit.
            git config user.email "ci-bot@example.com"
            git config user.name "CI Bot"
            branch="version-bump-$new_version"
            git checkout -b "$branch"
            git add Cargo.toml PKGBUILD fin.sol flake.nix INSTALL.md CHANGELOG.md

            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Bump version to $new_version"
              git push origin "$branch"
              gh pr create --fill --base trunk --head "$branch"
            fi

            # Build and package.
            cargo build --release
            cargo package --allow-dirty

            # Sign release assets (if they exist).
            shopt -s nullglob
            for file in target/debian/fin_*_amd64.deb target/fin-*-arch.tar.gz target/fin-*-solus.tar.gz target/fin-*-nix.tar.gz; do
              if [ -f "$file" ]; then
                gpg --detach-sign --armor "$file"
                sha256sum "$file" > "$file.sha256"
              else
                echo "File $file does not exist, skipping signing."
              fi
            done

            # Gather asset files.
            assets=()
            for file in target/debian/fin_*_amd64.deb target/fin-*-arch.tar.gz target/fin-*-solus.tar.gz target/fin-*-nix.tar.gz; do
              if [ -f "$file" ]; then
                assets+=("$file")
              fi
            done
            # Fallback: try target/package if no assets were found.
            if [ ${#assets[@]} -eq 0 ]; then
              for file in target/package/fin-*; do
                if [ -f "$file" ]; then
                  assets+=("$file")
                fi
              done
            fi

            # Handle tag: if it exists, push it; otherwise, create and push.
            if git rev-parse "v$new_version" >/dev/null 2>&1; then
              echo "Tag v$new_version exists locally, pushing tag."
              git push origin "v$new_version"
            else
              echo "Creating new tag v$new_version."
              git tag "v$new_version"
              git push origin "v$new_version"
            fi

            # Create or update GitHub release.
            if gh release view "v$new_version" >/dev/null 2>&1; then
              echo "Release v$new_version already exists; updating release."
              gh release edit "v$new_version" --title "Release v$new_version" --notes "Release $new_version"
            else
              if [ ${#assets[@]} -eq 0 ]; then
                echo "No release assets found, creating release without assets."
                gh release create "v$new_version" --title "Release v$new_version" --notes "Release $new_version"
              else
                gh release create "v$new_version" --title "Release v$new_version" --notes "Release $new_version" "${assets[@]}"
              fi
            fi





workflows:
  build_test_release:
    jobs:
      - env_check
      - verify_files
      - audit
      - lint:
          requires: [ env_check, verify_files, audit ]
      - test:
          requires: [ env_check, verify_files, audit ]
      - build:
          requires: [ env_check, verify_files, audit ]
      - release:
          requires: [ build, lint, test ]
          filters:
            branches:
              only: [ trunk ]
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$/
