version: 2.1

executors:
  fin-deb-build:
    docker:
      - image: hakimjonas/fin-deb-build
    working_directory: /workspace

jobs:
  env_check:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Environment Variables
          command: |
            set -euo pipefail
            for var in GH_TOKEN FINE_SIGNATURE_KEY_B64 FINE_SIGNATURE_PASSPHRASE CIRCLE_SHA1; do
              if [ -z "${!var:-}" ]; then
                echo "❌ $var is not set!"
                exit 1
              fi
            done
            echo "✅ All required environment variables are set."

  verify_files:
    executor: fin-deb-build
    steps:
      - checkout
      - run:
          name: Verify Required Files Exist
          command: |
            set -euo pipefail
            required_files=(Cargo.toml PKGBUILD fin.sol flake.nix INSTALL.md CHANGELOG.md packaging/aeryn/stone.yaml)
            for file in "${required_files[@]}"; do
              if [ ! -f "$file" ]; then
                echo "❌ Required file '$file' missing!"
                exit 1
              else
                echo "✅ File '$file' exists."
              fi
            done

  lint:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run:
          name: Install cargo-audit
          command: |
            if ! cargo audit --version &> /dev/null; then
              cargo install cargo-audit
            fi
      - run:
          name: Check for security vulnerabilities
          command: cargo audit
      - run: cargo clippy --all-targets --all-features --tests -- -D warnings
      - run: cargo fmt -- --check
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  test:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run: cargo test --workspace --release
      - save_cache:
          paths:
            - target
            - ~/.cargo/registry
            - ~/.cargo/git
          key: cargo-{{ checksum "Cargo.lock" }}

  build:
    executor: fin-deb-build
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run: rustup default stable
      - run: cargo build --release
      - persist_to_workspace:
          root: .
          paths:
            - target/release/fin

  bump_and_release:
    executor: fin-deb-build
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
      - run:
          name: Install cargo-make
          command: |
            if ! command -v cargo-make &> /dev/null; then
              cargo install cargo-make
            fi
      - run:
          name: Install cargo-deb
          command: |
            if ! cargo deb --version &> /dev/null; then
              cargo install cargo-deb --version 1.42.0
            fi
      - run:
          name: Bump Version and Release
          command: ./scripts/bump-and-release.sh

  build_stone:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Get latest version from trunk
          command: |
            git fetch origin trunk
            git checkout origin/trunk
      - restore_cache:
          keys:
            - rust-toolchain-v1-{{ arch }}
      - restore_cache:
          keys:
            - boulder-build-v1-{{ arch }}
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y uidmap curl build-essential pkg-config libgtk-4-dev jq
      - run:
          name: Install Rust
          command: |
            if [ -d "$HOME/.cargo" ] && [ -d "$HOME/.rustup" ]; then
              echo "Rust already installed from cache"
              source $HOME/.cargo/env
              rustc --version
            else
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              rustup default stable
            fi
      - run:
          name: Install just
          command: |
            source $HOME/.cargo/env
            if command -v just &> /dev/null; then
              echo "just already installed from cache"
            else
              cargo install just
            fi
      - run:
          name: Configure user namespaces
          command: |
            # Setup subuid/subgid for boulder's containerized builds
            sudo touch /etc/subuid /etc/subgid
            sudo usermod --add-subuids 1000000-1065535 --add-subgids 1000000-1065535 root
            sudo usermod --add-subuids 1065536-1131071 --add-subgids 1065536-1131071 $(whoami)
      - run:
          name: Build boulder from source
          command: |
            source $HOME/.cargo/env

            # Check if boulder is already cached
            if [ -x "$HOME/.local/bin/boulder" ]; then
              echo "Boulder already installed from cache"
              ~/.local/bin/boulder --version
            else
              git clone --depth 1 https://github.com/AerynOS/os-tools.git /tmp/os-tools
              cd /tmp/os-tools

              # Build boulder binary
              just boulder

              # Install boulder binary
              mkdir -p ~/.local/bin
              cp target/onboarding/boulder ~/.local/bin/

              # Install boulder data files (macros go to data dir)
              mkdir -p ~/.local/share/boulder
              cp -r boulder/data/macros ~/.local/share/boulder/

              # Install profiles to config dir
              mkdir -p ~/.config/boulder/profile.d
              cp boulder/data/profile.d/*.yaml ~/.config/boulder/profile.d/

              echo "Boulder installed:"
              ~/.local/bin/boulder --version
            fi

            echo "Data directory:"
            ls -la ~/.local/share/boulder/
      - run:
          name: Build .stone package
          command: |
            source $HOME/.cargo/env
            export PATH="$HOME/.local/bin:$PATH"

            # Get version from Cargo.toml
            VERSION=$(awk -F'"' '/^version *=/ {print $2; exit}' Cargo.toml)
            echo "Building .stone for version $VERSION"

            # Create output directory for .stone packages
            mkdir -p stone-output

            # Run boulder build (--output specifies where .stone files are written)
            boulder \
              --data-dir="$HOME/.local/share/boulder/" \
              --config-dir="$HOME/.config/boulder/" \
              --moss-root="$HOME/.cache/boulder/" \
              build \
              --output=stone-output \
              packaging/aeryn/stone.yaml

            # List generated .stone files
            echo "Generated .stone packages:"
            ls -la stone-output/*.stone
      - run:
          name: Upload .stone to GitHub Release
          command: |
            VERSION=$(awk -F'"' '/^version *=/ {print $2; exit}' Cargo.toml)
            TAG="v$VERSION"

            # Find release by tag
            RELEASE_INFO=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/hakimjonas/fin/releases/tags/$TAG")

            UPLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.upload_url' | sed 's/{?name,label}//')

            if [ "$UPLOAD_URL" = "null" ] || [ -z "$UPLOAD_URL" ]; then
              echo "❌ Could not find release for tag $TAG"
              exit 1
            fi

            echo "Found release, uploading .stone packages..."

            # Upload all .stone files from stone-output directory
            for stone_file in stone-output/*.stone; do
              if [ -f "$stone_file" ]; then
                filename=$(basename "$stone_file")
                echo "Uploading: $filename"
                curl -s --data-binary @"$stone_file" \
                  -H "Content-Type: application/octet-stream" \
                  -H "Authorization: token $GH_TOKEN" \
                  "$UPLOAD_URL?name=$filename"
              fi
            done

            echo "✅ .stone packages uploaded"
      - save_cache:
          key: rust-toolchain-v1-{{ arch }}
          paths:
            - ~/.cargo
            - ~/.rustup
      - save_cache:
          key: boulder-build-v1-{{ arch }}
          paths:
            - ~/.local/bin/boulder
            - ~/.local/share/boulder
            - ~/.config/boulder

workflows:
  # Run tests on all branches, bump and release only on trunk
  build_test_bump_release:
    jobs:
      - env_check:
          filters:
            tags:
              ignore: /.*/
      - verify_files:
          filters:
            tags:
              ignore: /.*/
      - lint:
          requires:
            - env_check
            - verify_files
          filters:
            tags:
              ignore: /.*/
      - build:
          requires:
            - lint
          filters:
            tags:
              ignore: /.*/
      - test:
          requires:
            - build
          filters:
            tags:
              ignore: /.*/
      - bump_and_release:
          requires:
            - test
          filters:
            branches:
              only: trunk
            tags:
              ignore: /.*/
      - build_stone:
          requires:
            - bump_and_release
          filters:
            branches:
              only: trunk
            tags:
              ignore: /.*/

